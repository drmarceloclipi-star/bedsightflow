name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Build · Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ward-board

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ward-board/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript + Vite)
        run: npm run build

      - name: Unit Tests (Vitest)
        run: npm run test:unit

  functions-ci:
    name: Functions · Build · Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ward-board/functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ward-board/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: Unit Tests (Jest)
        run: npm test

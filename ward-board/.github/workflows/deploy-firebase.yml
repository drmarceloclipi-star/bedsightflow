name: Deploy to Firebase
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Install Functions Dependencies
        working-directory: ./functions
        run: npm ci

      - name: Setup Firebase Functions Environment Variables
        run: |
          cat > functions/.env <<EOF
          BQ_PROJECT=lean-841e5
          BQ_DATASET=firestore_export
          BQ_USE_CURATED=true
          EOF

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEAN_841E5 }}
          channelId: live
          projectId: lean-841e5

      # For functions deployment since action-hosting-deploy only does hosting.
      - name: Write Service Account Key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEAN_841E5 }}' > /tmp/sa-key.json

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --non-interactive --project lean-841e5
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
